			shellPath = /bin/sh;
			shellScript = "set -euo pipefail\nCLI_DIR=\"$SRCROOT/cclight-cli\"\ncd \"$CLI_DIR\"\nswift build -c release --arch arm64 --disable-sandbox\n# Embed into Contents/MacOS/ so the kernel recognizes it as a code\n# location and lets the helper inherit the parent app's provisioning\n# profile (required for sandbox entitlements to validate at launch).\n# Name stays `cclightcli` to avoid case-insensitive APFS collision with\n# the parent app's MacOS/CCLight.\nDEST=\"$TARGET_BUILD_DIR/$PRODUCT_NAME.app/Contents/MacOS\"\nmkdir -p \"$DEST\"\ncp \".build/arm64-apple-macosx/release/cclightcli\" \"$DEST/cclightcli\"\nchmod +x \"$DEST/cclightcli\"\n# Re-sign with the parent app's identity + hardened runtime so App Store\n# accepts the nested binary (swift build leaves it adhoc-signed).\nif [ -n \"${EXPANDED_CODE_SIGN_IDENTITY:-}\" ]; then\n  codesign --force --sign \"$EXPANDED_CODE_SIGN_IDENTITY\" --options runtime --timestamp=none --entitlements \"$SRCROOT/cclight/cclight-cli.entitlements\" \"$DEST/cclightcli\"\nfi\n# Relocate the SwiftPM-generated dSYM so Xcode's archive step picks it\n# up with a UUID that matches the embedded binary.\nSRC_DSYM=\".build/arm64-apple-macosx/release/cclightcli.dSYM\"\nif [ -d \"$SRC_DSYM\" ] && [ -n \"${DWARF_DSYM_FOLDER_PATH:-}\" ]; then\n  OUT_DSYM=\"$DWARF_DSYM_FOLDER_PATH/cclightcli.dSYM\"\n  rm -rf \"$OUT_DSYM\"\n  cp -R \"$SRC_DSYM\" \"$OUT_DSYM\"\nfi\necho \"Embedded cclight CLI → $DEST/cclightcli\"\n";
		};
